const learned=new Set(JSON.parse(localStorage.getItem('toeicLearned')||'[]')),wrong=new Set(JSON.parse(localStorage.getItem('toeicWrong')||'[]'));let streak=Number(localStorage.getItem('toeicStreak')||0);
const $=id=>document.getElementById(id),key=r=>r.group+'||'+r.term,shuffle=a=>[...a].sort(()=>Math.random()-.5);
function save(){localStorage.setItem('toeicLearned',JSON.stringify([...learned]));localStorage.setItem('toeicWrong',JSON.stringify([...wrong]));localStorage.setItem('toeicStreak',streak)}
function initGroups(){let gs=[...new Set(DATA.map(x=>x.group))];$('group').innerHTML='<option value="ALL">Tất cả nhóm</option><option value="WRONG">Chỉ ôn từ sai</option>'+gs.map(g=>`<option>${g}</option>`).join('')}
function filterData(){let g=$('group').value,s=$('search').value.toLowerCase().trim();filtered=DATA.filter(r=>(g==='ALL'||g===r.group||(g==='WRONG'&&wrong.has(key(r))))&&(!s||r.term.toLowerCase().includes(s)||r.meaning.toLowerCase().includes(s)));if(!filtered.length)filtered=[...DATA];idx=0;renderAll()}

function answerMCQ(btn,o){if(answered)return;answered=true;let rev=$('direction').value==='vi-en',ok=key(o)===key(current),ans=rev?current.term:current.meaning;[...$('options').children].forEach(b=>{if(b.textContent===ans)b.classList.add('correct')});if(ok){streak++;learned.add(key(current));wrong.delete(key(current));$('mcqFeed').textContent='✓ Chính xác!'}else{streak=0;wrong.add(key(current));btn.classList.add('wrong');$('mcqFeed').textContent='✗ Đáp án: '+ans}save();stats()}

function norm(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9\s/;-]/g,'').trim()}
function checkType(){let rev=$('direction').value==='vi-en',target=rev?current.term:current.meaning,ans=$('typeAns').value,parts=norm(target).split(/[;/]/).map(x=>x.trim()).filter(Boolean),a=norm(ans),ok=a.length>1&&parts.some(x=>x.includes(a)||a.includes(x));if(ok){streak++;learned.add(key(current));wrong.delete(key(current));$('typeFeed').textContent='✓ Chính xác! '+target}else{streak=0;wrong.add(key(current));$('typeFeed').textContent='✗ Đáp án: '+target}save();stats()}
